name: chopper_example
description: Example usage of the Chopper package
version: 0.0.7
documentation: https://hadrien-lejard.gitbook.io/chopper/
#author: Hadrien Lejard <hadrien.lejard@gmail.com>

environment:
  sdk: ^3.9.0

dependencies:
  chopper: ^8.5.2
  json_annotation: ^4.12.0
  built_value: ^8.11.0
  analyzer: ">=8.0.0 <14.0.0"
  http: ^1.6.0
  built_collection: ^5.1.1
  cancelation_token: ^1.1.0
  logger: ^2.7.0
  squadron: ^7.4.3
  using: ^1.0.5

dev_dependencies:
  build_runner: ^2.15.0
  chopper_generator:
  json_serializable: ^6.14.0
  built_value_generator: ^8.12.5
  lints: ^6.1.0
  squadron_builder: ^9.2.0

dependency_overrides:
 chopper:
   path: ../chopper
 chopper_generator:
   path: ../chopper_generator
